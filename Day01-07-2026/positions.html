<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .a{
            width: 500px;
            background-color: aqua;
            position: relative;
            top: 100px;
        }
        .b{
            height: 200px;
            width: 200px;
            background-color: red;
            position: absolute;
            top: 100px;
            left: 200px;
        }
        .ab{
            height: 100px;
            width: 100%;
            background-color: green;
            position: fixed;
            top: 0px;
            z-index: 999;
        }
        .c{
            height: 900px;
            width: 500px;
            background-color: yellow;
            position: static;
        }
        .d{
            height: 100px;
            width: 100px;
            background-color: blue;
            margin-top: 100px;
            position: sticky;
            top: 0px;
        }
        .e{
            height: 100px;
            width: 100px;
            background-color: orange;
            position: fixed;
            top: 0px;
            right: 800px;
        }
    </style>
</head>
<body>
    <div class="ab"> </div>
    <div class="a">
        <div class="b"> </div>
    </div>
    <div class="c">
        <div class="d"> </div>
    </div>
    <div class="e"></div>
</body>
</html>
