<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .ab{
            height: 100px;
            width: 100%;
            background-color: white;
            position: fixed;
            top: 0px;
            z-index: 999;
        }
        .a{
            height:600px;
            width: 100%;
            background-image: url(https://wallpaperaccess.com/full/3351434.jpg);
            background-size: cover;
        }
        .b{
            height: 300px;
            width: 400px;
            position: absolute;
            font-family: cursive;
            top: 150px;
            left: 50px;
            color: black;
            padding: 20px;
        }
        .e{
            height: 20px;
            width: 150px;
            background-color: rgb(0, 140, 255);
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 20px;
        }
        .c{
            height: 50px;
            width: 50px;
            background-color: rgb(0, 140, 255);
            border-radius: 50%;
            position: sticky;
            top: 450px;
            left: 1050px;
            z-index: 999;
        }
        .d{
            width: 90%;
            height:220px;
            background-color: white;
            margin: 80px auto;
            padding: 20px;
        }
        .box{
            display: inline-block;
            vertical-align: middle;
            margin-right: 20px;
        }
        .f{
            height: 50px;
            width: 50px;
            background-color: rgb(0, 140, 255);
            border-radius: 50%;
            position: sticky;
            top: 400px;
            left: 1090px;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div class="ab"> </div>
    <div class="a">
        <div class="b">
            <h1>Your Journey Begins</h1>
            <p>Take advantage of this amazing exclusive offers.</p>
            <div class="e">Explore More</div>
        </div>
        <div class="c"> </div>
    </div>
    <div class="d">

    <div class="box">
        <label>Date From:</label><br><br>
        <input type="date">
    </div>

    <div class="box">
        <label>Destinations:</label><br><br>
        <select>
            <option>Select Location</option>
            <option>Goa</option>
            <option>Manali</option>
            <option>Shimla</option>
        </select>
    </div>

    <div class="box">
        <label>Activity:</label><br><br>
        <select>
            <option>Select Any</option>
            <option>Camping</option>
            <option>Trekking</option>
        </select>
    </div>

    <div class="box">
        <label>Guests:</label><br><br>
        <input type="number" placeholder="0">
    </div>

    <div class="box">
        <button>Find Tour</button>
    </div>
    <div class="f"></div>
</div>
</body>
</html>
