<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Ordered List</h2>
    <p> types = A,a,i,I,1</p>
    <ol type="A">
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ol>
    <h2>Unordered List</h2>
    <p> types = circle, square,bullet</p>
    <ul type ="square">
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>
    <h2>Nested List</h2>
    <ol>
        <li>Item 1
            <ul>
                <li>Item 1.1</li>
                <li>Item 1.2</li>
            </ul>
        </li>
    </ol>
    <ul>
        <li>Item2
            <ol>
                <li>Item 2.1</li>
                <li>Item 2.2</li>
            </ol>
        </li>
    </ul>

</body>
</html>
