<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body border="2" bgcolor="lightblue">
    <form align="center">
        <h2 align="center"><font color="red">Personal Details</font></h2><br><br>
        <label>Name: <input type="text"></label><br><br>
        <label>Password: <input type="password"></label><br><br>
        <label>E_mail id: <input type="email"></label><br><br>
        <label>Gender: <input type="radio" name="gender">Male
        <input type="radio" name="gender">Female
        </label><br>
        <label>Contact#: <input type="tel"></label><br><br>
        <h2 align="center"><font color="red">Educational Qualifications</font></h2><br><br>
        <label>Degree: 
            <select>
                <option value="select">--Select Group--</option>
                <option value="btech">B.Tech</option>
                <option value="mtech">M.Tech</option>
                <option value="mba">MBA</option>
            </select>
        </label><br><br>
        <label>Engineering:
            <select>
                <option value="select">--Select Group--</option>
                <option value="cse">CSE</option>
                <option value="ece">ECE</option>
                <option value="mech">MECH</option>
            </select>
        </label><br><br>
        <label>Hobbies: 
            <input type="checkbox">Playing chess
            <input type="checkbox">Reading Books
        </label><br><br>
        <label>Address: <br><textarea> </textarea></label><br><br>
        <label>Attach Resume: <input type="file"></label><br><br>
        <input type="submit"><br><br>
    </form>
    
    
</body>
</html>
