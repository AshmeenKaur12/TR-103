<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            color: red;
            font-size: 55px;
            font-weight: 900;
            text-decoration: overline;/* underline, line-through, overline */
            text-align: center;
            text-shadow: 2px 2px 5px blue;
            font-family: cursive;
        }
        div{
            height: 800px;
            width: 2000px;
            background-image: url('https://static.vecteezy.com/system/resources/thumbnails/036/798/913/small_2x/ai-generated-an-abstract-painting-of-a-colorful-tree-and-leaves-free-photo.jpg');
            background-repeat: no-repeat;
            background-size: cover;/*contain, cover, width height*/
            background-position: center;
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <p>paragraph</p>
    <div></div>
</body>
</html>
