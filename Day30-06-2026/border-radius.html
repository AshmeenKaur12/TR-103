<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1{
            height: 700px;
            width: 900px;
            margin: 20px 20px 20px 20px;
            float: left;
        }
        .box2{
            height: 700px;
            width: 900px;
            margin: 20px 20px 20px 20px;
            float: left;
        }
        .a{
            height: 100px;
            width: 500px;
            background-color: rgb(48, 170, 210);
            margin: 20px 20px 20px 20px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            border: 5px solid rgb(0, 0, 0);
        }
        .b{
            height: 100px;
            width: 500px;
            margin: 20px 20px 20px 20px;
            background-color: rgb(52, 56, 159);
            border-top-left-radius: 50px;
            border-bottom-right-radius: 50px;
            border: 5px solid rgb(0, 0, 0);
        }
        .c{
            height: 100px;
            width: 500px;  
            margin: 20px 20px 20px 20px; 
            background-color: rgb(151, 235, 243);
            border-top-right-radius: 30px;
            border: 5px solid rgb(0, 0, 0);
        }
        .d{
            height: 100px;
            width: 500px;
            margin: 20px 20px 20px 20px;
            background-color: rgb(28, 7, 97);
            border-top-left-radius: 50px;
            border-top-right-radius: 20px;
            border-bottom-right-radius: 50px;
            border: 5px solid rgb(0, 0, 0);
        }
        .e{
            height: 100px;
            width: 500px;
            margin: 20px 20px 20px 20px;
            background-color: rgb(237, 161, 38);
            border-top-left-radius: 50px;
            border-top-right-radius: 50px;
            border-bottom-right-radius: 50px;
            border: 5px solid rgba(0, 0, 0, 0);
        }
        
        .f{
            height: 100px;
            width: 500px;
            margin: 20px 20px 20px 20px;
            background-color: rgb(237, 161, 38);
            border-top-left-radius: 100px;
            border: 5px solid rgb(0, 0, 0);
        }
        .circle{
            width:500px;
            height:500px;
            border:4px solid black;
            background:#f55b8b;
            border-radius:50%;
            float: right;
        }
    </style>
</head>
<body>
    <div class="box1">
    <div class="a"></div>
    <div class="b"></div>
    <div class="c"></div>
    </div>
    <div class="box2">
    <div class="d"></div>
    <div class="e"></div>
    <div class="f"></div>
    </div>
    <div class="circle"></div>
</body>
</html>
